name: unirent CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # NODE SETUP
      # =========================

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # FRONTEND TEST
      # =========================

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test -- --watchAll=false || true

      # =========================
      # BACKEND TEST
      # =========================

      - name: Install Backend Dependencies
        run: |
          cd Backend
          npm install

      - name: Run Backend Tests
        run: |
          cd Backend
          npm test

      # =========================
      # SONARQUBE SCAN
      # =========================

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # =========================
      # DOCKER LOGIN
      # =========================

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =========================
      # BUILD IMAGES
      # =========================

      - name: Build Backend Docker Image
        run: docker build -t abhishek2704/unirent-backend ./Backend

      - name: Build Frontend Docker Image
        run: docker build -t abhishek2704/unirent-frontend ./frontend

      # =========================
      # TRIVY SECURITY SCAN
      # =========================

      - name: Run Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: abhishek2704/unirent-backend
          format: table
          exit-code: 0
          ignore-unfixed: true

      - name: Run Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: abhishek2704/unirent-frontend
          format: table
          exit-code: 0
          ignore-unfixed: true

      # =========================
      # PUSH IMAGES
      # =========================

      - name: Push Backend Docker Image
        run: docker push abhishek2704/unirent-backend

      - name: Push Frontend Docker Image
        run: docker push abhishek2704/unirent-frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/unirent

            git pull origin main

            sudo docker compose down

            sudo docker compose pull

            sudo docker compose up -d --build

            sudo docker image prune -af