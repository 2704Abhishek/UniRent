name: unirent CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      # Checkout Code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3

        with:
          node-version: 20

      # =========================
      # Backend Build
      # =========================

      - name: Install Backend Dependencies
        run: |
          cd Backend
          npm install

      - name: Build Backend
        run: |
          cd Backend
          npm run build --if-present

      # =========================
      # Frontend Build
      # =========================

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # =========================
      # Docker Login
      # =========================

      - name: Login to Docker Hub
        uses: docker/login-action@v2

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =========================
      # Build Docker Images
      # =========================

      - name: Build Backend Docker Image
        run: docker build -t abhishek2704/unirent-backend ./Backend

      - name: Build Frontend Docker Image
        run: docker build -t abhishek2704/unirent-frontend ./frontend

      # =========================
      # Push Docker Images
      # =========================

      - name: Push Backend Docker Image
        run: docker push abhishek2704/unirent-backend

      - name: Push Frontend Docker Image
        run: docker push abhishek2704/unirent-frontend

  deploy:

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/unirent
            git pull origin main
            sudo docker compose down
            sudo docker compose up -d --build