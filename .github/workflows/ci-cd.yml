name: unirent CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend

      - name: Install Backend Dependencies
        run: |
          cd Backend
          npm install

      - name: Build backend
        run: |
          cd Backend
          npm run build --if-present

      # Frontend

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Docker Image
        run: docker build -t abhishek2704/unirent-backend ./Backend

      - name: Build Frontend Docker Image
        run: docker build -t abhishek2704/unirent-frontend ./frontend

      - name: Push Backend Docker Image
        run: docker push abhishek2704/unirent-backend

      - name: Push Frontend Docker Image
        run: docker push abhishek2704/unirent-frontend