name: unirent CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # CHECKOUT CODE
      # =========================

      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # SETUP NODE
      # =========================

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # INSTALL FRONTEND
      # =========================

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      # =========================
      # FRONTEND TESTS
      # =========================

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test -- --watchAll=false || true

      # =========================
      # INSTALL BACKEND
      # =========================

      - name: Install Backend Dependencies
        run: |
          cd Backend
          npm install

      # =========================
      # BACKEND TESTS
      # =========================

      - name: Run Backend Tests
        run: |
          cd Backend
          npm test

      # =========================
      # SONARCLOUD SCAN
      # =========================

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=2704Abhishek_unirent
            -Dsonar.organization=2704abhishek

      # =========================
      # DOCKER LOGIN
      # =========================

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =========================
      # BUILD BACKEND IMAGE
      # =========================

      - name: Build Backend Docker Image
        run: docker build -t abhishek2704/unirent-backend ./Backend

      # =========================
      # BUILD FRONTEND IMAGE
      # =========================

      - name: Build Frontend Docker Image
        run: docker build -t abhishek2704/unirent-frontend ./frontend

      # =========================
      # TRIVY BACKEND SCAN
      # =========================

      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: abhishek2704/unirent-backend
          format: table
          exit-code: 0
          ignore-unfixed: true

      # =========================
      # TRIVY FRONTEND SCAN
      # =========================

      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: abhishek2704/unirent-frontend
          format: table
          exit-code: 0
          ignore-unfixed: true

      # =========================
      # PUSH BACKEND IMAGE
      # =========================

      - name: Push Backend Docker Image
        run: docker push abhishek2704/unirent-backend

      # =========================
      # PUSH FRONTEND IMAGE
      # =========================

      - name: Push Frontend Docker Image
        run: docker push abhishek2704/unirent-frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:

      # =========================
      # DEPLOY TO EC2
      # =========================

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
          script_stop: true

          script: |
            set -e

            cd ~/unirent

            git pull origin main

            echo "$DOCKER_PASSWORD" | sudo docker login -u "$DOCKER_USERNAME" --password-stdin

            sudo docker compose pull

            sudo docker compose up -d --remove-orphans

            sudo docker image prune -af
